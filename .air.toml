[build]
cmd = "go build -o ./tmp/bt-spider-dev ."
entrypoint = "./tmp/bt-spider-dev"
include_ext = ["go", "tpl", "tmpl", "html", "json"]
exclude_dir = [".git", ".gocache", ".gomodcache", "tmp"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "800ms"

[log]
time = true

[color]
main = "yellow"
watcher = "cyan"
build = "green"
runner = "magenta"

[misc]
clean_on_exit = true
