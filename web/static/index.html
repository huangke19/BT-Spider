<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BT-Spider Web UI</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: rgba(255, 251, 244, 0.82);
      --panel-strong: #fffaf1;
      --border: rgba(68, 51, 30, 0.12);
      --text: #2e2418;
      --muted: #766757;
      --accent: #c7632b;
      --accent-deep: #8d3d16;
      --ok: #2f7d32;
      --warn: #b55822;
      --err: #b93131;
      --shadow: 0 18px 50px rgba(86, 59, 28, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(199, 99, 43, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(84, 130, 92, 0.16), transparent 26%),
        linear-gradient(180deg, #f8f4ed 0%, #f2ecdf 100%);
      min-height: 100vh;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 40px;
    }

    .hero {
      padding: 28px;
      border-radius: calc(var(--radius) + 6px);
      background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,248,237,0.94));
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent-deep);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", ui-serif, serif;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .meta {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.65);
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 1.08fr 0.92fr;
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px;
      backdrop-filter: blur(14px);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 17px;
      letter-spacing: 0.01em;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.78);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      font: inherit;
      transition: border-color 150ms ease, transform 150ms ease;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 98px;
    }

    textarea:focus,
    input:focus {
      border-color: rgba(199, 99, 43, 0.45);
      transform: translateY(-1px);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease, box-shadow 140ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 22px rgba(70, 44, 20, 0.12);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .primary {
      background: linear-gradient(135deg, #d76f33, #b7501d);
      color: #fff8f3;
    }

    .secondary {
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .notice {
      min-height: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .notice.error {
      color: var(--err);
    }

    .notice.success {
      color: var(--ok);
    }

    .results,
    .tasks {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 13px;
      color: var(--muted);
    }

    .toolbar select {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.82);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      outline: none;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 50px;
      padding: 0 4px;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
    }

    .field-hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .item {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      padding: 16px;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .item-title {
      font-weight: 700;
      line-height: 1.45;
    }

    .item-meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(199, 99, 43, 0.11);
      color: var(--accent-deep);
      font-size: 12px;
      white-space: nowrap;
    }

    .task-bar {
      margin-top: 12px;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(85, 71, 52, 0.10);
    }

    .task-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #d46b31, #efb15c);
      transition: width 280ms ease;
    }

    .task-foot {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    .state-ok { color: var(--ok); }
    .state-warn { color: var(--warn); }
    .state-err { color: var(--err); }

    .empty {
      color: var(--muted);
      padding: 12px 0;
      font-size: 14px;
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .shell {
        width: min(100% - 20px, 1180px);
      }

      .hero,
      .card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="eyebrow">BT-SPIDER WEB</div>
      <h1>轻量 Web 控台</h1>
      <p class="subtitle">搜索电影、直接粘贴磁力链接、查看下载任务状态。没有前端框架，没有额外后端依赖，只是给现有引擎加了一层很薄的浏览器外壳。</p>
      <div class="meta">
        <div class="pill" id="downloadDir">下载目录加载中...</div>
        <div class="pill">任务列表每 1 秒自动刷新</div>
      </div>
    </section>

    <section class="layout">
      <div class="stack">
        <article class="card">
          <h2>搜索资源</h2>
          <label for="query">关键词</label>
          <input id="query" type="text" placeholder="例如：The Bourne Supremacy 2004">
          <div class="actions" style="margin-top: 12px;">
            <button class="primary" id="searchBtn">搜索</button>
            <button class="secondary" id="clearResultsBtn">清空结果</button>
          </div>
          <div class="notice" id="searchNotice"></div>
          <div class="toolbar">
            <div class="toolbar-group">
              <span class="toolbar-label">排序</span>
              <select id="sortField">
                <option value="seeders">做种数量</option>
                <option value="size">文件大小</option>
              </select>
              <select id="sortDirection">
                <option value="desc">降序</option>
                <option value="asc">升序</option>
              </select>
            </div>
            <div class="toolbar-label" id="resultMeta"></div>
          </div>
          <div class="results" id="results"></div>
        </article>

        <article class="card">
          <h2>做种策略</h2>
          <div class="settings-grid">
            <div>
              <label for="seedEnabled">下载完成后继续做种</label>
              <div class="toggle-row">
                <input id="seedEnabled" type="checkbox">
                <span class="toolbar-label">启用自动做种</span>
              </div>
            </div>
            <div>
              <label for="seedRatioLimit">分享率上限</label>
              <input id="seedRatioLimit" type="number" min="0" step="0.1" placeholder="1.0">
              <div class="field-hint">设为 0 表示不按分享率停止</div>
            </div>
            <div>
              <label for="seedTimeLimit">保种时长</label>
              <input id="seedTimeLimit" type="text" placeholder="30m">
              <div class="field-hint">例如 30m、2h、0s</div>
            </div>
          </div>
          <div class="notice" id="seedNotice"></div>
        </article>

        <article class="card">
          <h2>直接添加磁力</h2>
          <label for="magnet">Magnet URI</label>
          <textarea id="magnet" placeholder="magnet:?xt=urn:btih:..."></textarea>
          <div class="actions" style="margin-top: 12px;">
            <button class="primary" id="addMagnetBtn">加入下载</button>
          </div>
          <div class="notice" id="magnetNotice"></div>
        </article>
      </div>

      <article class="card">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;">
          <h2 style="margin:0;">下载任务</h2>
          <div class="actions">
            <button class="secondary" id="refreshTasksBtn">立即刷新</button>
            <button class="secondary" id="clearFinishedBtn">清理已结束</button>
          </div>
        </div>
        <div class="notice" id="taskNotice"></div>
        <div class="tasks" id="tasks"></div>
      </article>
    </section>
  </main>

  <script>
    const state = {
      results: [],
      tasks: [],
      sortField: 'seeders',
      sortDirection: 'desc'
    };

    const els = {
      query: document.getElementById('query'),
      searchBtn: document.getElementById('searchBtn'),
      clearResultsBtn: document.getElementById('clearResultsBtn'),
      sortField: document.getElementById('sortField'),
      sortDirection: document.getElementById('sortDirection'),
      resultMeta: document.getElementById('resultMeta'),
      searchNotice: document.getElementById('searchNotice'),
      results: document.getElementById('results'),
      magnet: document.getElementById('magnet'),
      addMagnetBtn: document.getElementById('addMagnetBtn'),
      magnetNotice: document.getElementById('magnetNotice'),
      seedEnabled: document.getElementById('seedEnabled'),
      seedRatioLimit: document.getElementById('seedRatioLimit'),
      seedTimeLimit: document.getElementById('seedTimeLimit'),
      seedNotice: document.getElementById('seedNotice'),
      tasks: document.getElementById('tasks'),
      taskNotice: document.getElementById('taskNotice'),
      clearFinishedBtn: document.getElementById('clearFinishedBtn'),
      refreshTasksBtn: document.getElementById('refreshTasksBtn'),
      downloadDir: document.getElementById('downloadDir')
    };

    function setNotice(target, text, kind = '') {
      target.textContent = text || '';
      target.className = 'notice' + (kind ? ` ${kind}` : '');
    }

    async function request(url, options = {}) {
      const response = await fetch(url, {
        headers: { 'Content-Type': 'application/json' },
        ...options
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : {};
      if (!response.ok) {
        throw new Error(data.error || `请求失败 (${response.status})`);
      }
      return data;
    }

    function escapeHTML(text) {
      return String(text).replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[ch]));
    }

    function parseSizeToBytes(sizeText) {
      const text = String(sizeText || '').trim().toUpperCase();
      const match = text.match(/^([\d.]+)\s*([KMGTP]?B)$/);
      if (!match) return -1;

      const value = Number(match[1]);
      if (!Number.isFinite(value)) return -1;

      const units = {
        B: 1,
        KB: 1024,
        MB: 1024 ** 2,
        GB: 1024 ** 3,
        TB: 1024 ** 4,
        PB: 1024 ** 5
      };
      return value * (units[match[2]] || 1);
    }

    function getSortedResults() {
      const results = [...state.results];
      const factor = state.sortDirection === 'asc' ? 1 : -1;

      results.sort((a, b) => {
        let av = 0;
        let bv = 0;

        if (state.sortField === 'size') {
          av = parseSizeToBytes(a.size);
          bv = parseSizeToBytes(b.size);
        } else {
          av = Number(a.seeders) || 0;
          bv = Number(b.seeders) || 0;
        }

        if (av !== bv) {
          return (av - bv) * factor;
        }
        return a.name.localeCompare(b.name) * factor;
      });

      return results;
    }

    function getSeedSettingsPayload() {
      const ratioText = els.seedRatioLimit.value.trim();
      const timeText = els.seedTimeLimit.value.trim();
      const payload = {
        seed: els.seedEnabled.checked
      };

      if (ratioText !== '') {
        const ratio = Number(ratioText);
        if (!Number.isFinite(ratio) || ratio < 0) {
          throw new Error('分享率上限必须是大于等于 0 的数字');
        }
        payload.seed_ratio_limit = ratio;
      }

      payload.seed_time_limit = timeText === '' ? '0s' : timeText;
      return payload;
    }

    function renderResults() {
      if (!state.results.length) {
        els.resultMeta.textContent = '';
        els.results.innerHTML = '<div class="empty">还没有搜索结果，试试电影名、年份或直接贴磁力链接。</div>';
        return;
      }

      const sortedResults = getSortedResults();
      const sortLabel = state.sortField === 'size' ? '文件大小' : '做种数量';
      const directionLabel = state.sortDirection === 'asc' ? '升序' : '降序';
      els.resultMeta.textContent = `${sortedResults.length} 条结果，按${sortLabel}${directionLabel}`;

      els.results.innerHTML = sortedResults.map((item, index) => `
        <div class="item">
          <div class="item-head">
            <div>
              <div class="item-title">${escapeHTML(item.name)}</div>
              <div class="item-meta">
                <span>大小 ${escapeHTML(item.size || '未知')}</span>
                <span>做种 ${item.seeders}</span>
                <span>下载 ${item.leechers}</span>
                <span>来源 ${escapeHTML(item.source)}</span>
              </div>
            </div>
            <button class="primary" data-index="${index}">下载</button>
          </div>
        </div>
      `).join('');

      els.results.querySelectorAll('button[data-index]').forEach((button) => {
        button.addEventListener('click', async () => {
          const item = sortedResults[Number(button.dataset.index)];
          if (!item) return;
          button.disabled = true;
          try {
            const data = await request('/api/download', {
              method: 'POST',
              body: JSON.stringify({
                magnet: item.magnet,
                name: item.name,
                ...getSeedSettingsPayload()
              })
            });
            setNotice(els.searchNotice, data.message, 'success');
            setNotice(els.seedNotice, '新任务将按当前做种策略运行', 'success');
            await loadTasks();
          } catch (error) {
            if (error.message.includes('分享率上限') || error.message.includes('保种时长')) {
              setNotice(els.seedNotice, error.message, 'error');
            } else {
              setNotice(els.searchNotice, error.message, 'error');
            }
          } finally {
            button.disabled = false;
          }
        });
      });
    }

    function stateClass(stateText) {
      if (stateText === '已完成') return 'state-ok';
      if (stateText === '失败') return 'state-err';
      if (stateText === '等待元数据') return 'state-warn';
      return '';
    }

    function renderTasks() {
      if (!state.tasks.length) {
        els.tasks.innerHTML = '<div class="empty">暂无下载任务。</div>';
        return;
      }

      els.tasks.innerHTML = state.tasks.map((task) => `
        <div class="item">
          <div class="item-head">
            <div>
              <div class="item-title">${escapeHTML(task.name || task.id)}</div>
              <div class="item-meta">
                <span class="chip ${stateClass(task.state)}">${escapeHTML(task.state)}</span>
                <span>Peers ${task.peers}</span>
                <span>速度 ${escapeHTML(task.speed_text)}</span>
                <span>ETA ${escapeHTML(task.eta_text)}</span>
                ${task.state === '做种中' ? `<span>上传 ${escapeHTML(task.uploaded_text)}</span>` : ''}
                ${task.state === '做种中' ? `<span>分享率 ${task.share_ratio.toFixed(2)}</span>` : ''}
                ${task.state === '做种中' ? `<span>已保种 ${escapeHTML(task.seed_elapsed)}</span>` : ''}
              </div>
            </div>
            <button class="secondary" data-cancel="${escapeHTML(task.id)}">取消</button>
          </div>
          <div class="task-bar">
            <div class="task-fill" style="width:${task.percent.toFixed(1)}%"></div>
          </div>
          <div class="task-foot">
            <span>${escapeHTML(task.completed_text)} / ${escapeHTML(task.total_text)}</span>
            <span>${task.percent.toFixed(1)}%</span>
          </div>
          ${task.error ? `<div class="notice error" style="margin-top:10px;">${escapeHTML(task.error)}</div>` : ''}
        </div>
      `).join('');

      els.tasks.querySelectorAll('button[data-cancel]').forEach((button) => {
        button.addEventListener('click', async () => {
          button.disabled = true;
          try {
            const data = await request(`/api/tasks/${button.dataset.cancel}`, { method: 'DELETE' });
            setNotice(els.taskNotice, data.message, 'success');
            await loadTasks();
          } catch (error) {
            setNotice(els.taskNotice, error.message, 'error');
            button.disabled = false;
          }
        });
      });
    }

    async function loadConfig() {
      try {
        const data = await request('/api/config');
        els.downloadDir.textContent = `下载目录：${data.download_dir}`;
        els.seedEnabled.checked = Boolean(data.seed);
        els.seedRatioLimit.value = data.seed_ratio_limit ?? 0;
        els.seedTimeLimit.value = data.seed_time_limit || '0s';
      } catch (error) {
        els.downloadDir.textContent = `配置加载失败：${error.message}`;
      }
    }

    async function loadTasks(silent = true) {
      try {
        const data = await request('/api/tasks');
        state.tasks = data.tasks || [];
        renderTasks();
        if (!silent) {
          setNotice(els.taskNotice, '任务列表已刷新', 'success');
        }
      } catch (error) {
        setNotice(els.taskNotice, error.message, 'error');
      }
    }

    async function onSearch() {
      const query = els.query.value.trim();
      if (!query) {
        setNotice(els.searchNotice, '请输入搜索关键词', 'error');
        return;
      }

      els.searchBtn.disabled = true;
      setNotice(els.searchNotice, '正在搜索，请稍等...');
      try {
        const data = await request('/api/search', {
          method: 'POST',
          body: JSON.stringify({ query })
        });
        state.results = data.results || [];
        renderResults();
        if (state.results.length) {
          setNotice(els.searchNotice, `找到 ${state.results.length} 个结果`, 'success');
        } else {
          setNotice(els.searchNotice, '没有找到有做种的结果', 'error');
        }
      } catch (error) {
        state.results = [];
        renderResults();
        setNotice(els.searchNotice, error.message, 'error');
      } finally {
        els.searchBtn.disabled = false;
      }
    }

    async function onAddMagnet() {
      const magnet = els.magnet.value.trim();
      if (!magnet) {
        setNotice(els.magnetNotice, '请输入磁力链接', 'error');
        return;
      }

      els.addMagnetBtn.disabled = true;
      try {
        const data = await request('/api/download', {
          method: 'POST',
          body: JSON.stringify({
            magnet,
            ...getSeedSettingsPayload()
          })
        });
        els.magnet.value = '';
        setNotice(els.magnetNotice, data.message, 'success');
        setNotice(els.seedNotice, '新任务将按当前做种策略运行', 'success');
        await loadTasks();
      } catch (error) {
        if (error.message.includes('分享率上限') || error.message.includes('保种时长')) {
          setNotice(els.seedNotice, error.message, 'error');
        } else {
          setNotice(els.magnetNotice, error.message, 'error');
        }
      } finally {
        els.addMagnetBtn.disabled = false;
      }
    }

    async function onClearFinished() {
      try {
        const data = await request('/api/tasks/clear', { method: 'POST' });
        setNotice(els.taskNotice, data.message, 'success');
        await loadTasks();
      } catch (error) {
        setNotice(els.taskNotice, error.message, 'error');
      }
    }

    els.searchBtn.addEventListener('click', onSearch);
    els.sortField.addEventListener('change', () => {
      state.sortField = els.sortField.value;
      renderResults();
    });
    els.sortDirection.addEventListener('change', () => {
      state.sortDirection = els.sortDirection.value;
      renderResults();
    });
    els.query.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') onSearch();
    });
    els.clearResultsBtn.addEventListener('click', () => {
      state.results = [];
      renderResults();
      setNotice(els.searchNotice, '');
    });
    els.addMagnetBtn.addEventListener('click', onAddMagnet);
    els.seedEnabled.addEventListener('change', () => {
      setNotice(els.seedNotice, els.seedEnabled.checked ? '新任务会在下载完成后继续做种' : '新任务下载完成后将直接结束', 'success');
    });
    els.clearFinishedBtn.addEventListener('click', onClearFinished);
    els.refreshTasksBtn.addEventListener('click', () => loadTasks(false));

    renderResults();
    renderTasks();
    loadConfig();
    loadTasks();
    window.setInterval(() => loadTasks(), 1000);
  </script>
</body>
</html>
